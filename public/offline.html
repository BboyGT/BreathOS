<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BreatheOS — Offline</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#030b14" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Cormorant+Garamond:wght@300;400&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #030b14 0%, #0a1628 50%, #061220 100%);
      color: #e8f4f0;
      font-family: 'Cormorant Garamond', Georgia, serif;
      padding: 24px;
    }
    .card {
      background: rgba(127, 255, 212, 0.03);
      border: 1px solid rgba(127, 255, 212, 0.12);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      backdrop-filter: blur(16px);
    }
    .icon { font-size: 52px; margin-bottom: 24px; display: block; animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      color: #7fffd4;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: rgba(232, 244, 240, 0.55);
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .tip {
      font-size: 13px;
      color: rgba(127, 255, 212, 0.4);
      letter-spacing: 0.05em;
      margin-top: 24px;
      font-style: italic;
    }
    button {
      margin-top: 28px;
      background: linear-gradient(135deg, rgba(15,46,36,0.9), rgba(26,74,56,0.9));
      border: 1px solid rgba(127,255,212,0.25);
      color: #7fffd4;
      padding: 14px 32px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.25s;
    }
    button:hover { box-shadow: 0 0 24px rgba(127,255,212,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🌿</span>
    <h1>You're Offline</h1>
    <p>BreatheOS needs a connection to load. Your saved data will be right here when you reconnect.</p>
    <p class="tip">"Breathe in slowly, breathe out fully — the rest will follow."</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
